<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Staircases">
  <rect width="100" height="100" rx="22" fill="#3c6b49"/>
  <!-- A descending staircase of tiles. -->
  <g fill="#f3f6ee">
    <rect x="20" y="22" width="18" height="18" rx="4"/>
    <rect x="20" y="42" width="18" height="18" rx="4"/>
    <rect x="40" y="42" width="18" height="18" rx="4"/>
    <rect x="40" y="62" width="18" height="18" rx="4"/>
    <rect x="60" y="62" width="18" height="18" rx="4"/>
  </g>
  <rect x="60" y="42" width="18" height="18" rx="4" fill="#d98a3c"/>
</svg>
