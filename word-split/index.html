<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#b8cab0" />
  <title>Word Split has moved</title>
  <meta http-equiv="refresh" content="0; url=../" />
  <style>
    body { margin: 0; background: #b8cab0; color: #232b22; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .wrap { max-width: 420px; margin: 0 auto; padding: 80px 20px; text-align: center; }
    a { color: #3c6b49; font-weight: 700; }
  </style>
</head>
<body>
  <div class="wrap">
    <p>Word Split is now two separate games — <a href="../combos/">Combos</a> and
       <a href="../forks/">Forks</a>. Redirecting to <a href="../">all games</a>…</p>
  </div>
  <script>
    /* Word Split's old service worker cached this shell for offline/PWA use.
     * A meta-refresh alone can be served from that stale cache before this
     * script ever runs, so also unregister any SW here as a second path to
     * getting off the old cached page (sw.js does the same as a kill switch
     * on its own update cycle, in case this page itself was cached). */
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.getRegistrations().then((regs) => {
        for (const r of regs) r.unregister();
      });
    }
    if (window.caches) {
      caches.keys().then((keys) => keys.forEach((k) => caches.delete(k)));
    }
    location.replace("../");
  </script>
</body>
</html>
